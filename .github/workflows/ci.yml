name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Build and Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        # This will run the React build (via Docker or Maven if plugin configured)
        # and execute ApplicationTests.java
        run: mvn clean verify

  # We will add the 'deploy' job here in Phase 5
  # We will add the 'deploy' job here in Phase 5
  # This job only runs if the 'test' job succeeds
  deploy:
    name: Deploy to Render
    needs: test  # <--- This is the magic line!
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -f ${{ secrets.RENDER_DEPLOY_HOOK_URL }}



